<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes — Clip</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="color-yellow stack">
    <!-- One window renders the whole clip: only the top note is in the DOM. -->
    <div class="stack-card">
      <header class="toolbar" data-tauri-drag-region>
        <div class="swatches">
          <button class="swatch s-yellow" data-color="yellow" title="Yellow"></button>
          <button class="swatch s-pink" data-color="pink" title="Pink"></button>
          <button class="swatch s-blue" data-color="blue" title="Blue"></button>
          <button class="swatch s-green" data-color="green" title="Green"></button>
          <button class="swatch s-purple" data-color="purple" title="Purple"></button>
        </div>
        <div class="actions">
          <button id="unclip-one" class="icon-btn" title="Take this note out of the clip" aria-label="Un-clip this note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m8 7 4-4 4 4"/><path d="M5 21h14"/></svg></button>
          <button id="unclip-all" class="icon-btn" title="Un-clip all - fan back into windows" aria-label="Un-clip all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg></button>
          <button id="delete-note" class="icon-btn danger" title="Delete this note" aria-label="Delete note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
        </div>
      </header>

      <div class="stack-nav">
        <button id="prev" class="icon-btn" title="Previous note" aria-label="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
        <input id="clip-name" class="clip-name" aria-label="Clip name" placeholder="Clip" />
        <span id="clip-pos" class="clip-pos"></span>
        <button id="next" class="icon-btn" title="Next note" aria-label="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>

      <textarea id="content" spellcheck="true" placeholder="Write something…"></textarea>
    </div>

    <div id="resize-handle" title="Drag to resize" aria-hidden="true"></div>

    <script src="stack.js"></script>
  </body>
</html>
